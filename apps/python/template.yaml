AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2024-10-16
Description: Minimal Python Lambda reference app with API Gateway.

Resources:
  PythonApiFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: .
      Handler: app.handler
      Runtime: python3.12
      Architectures:
        - x86_64
      MemorySize: 256
      Timeout: 10
      Events:
        Api:
          Type: HttpApi
          Properties:
            Path: /
            Method: GET

Outputs:
  PythonApiUrl:
    Description: HTTP API endpoint URL
    Value:
      Fn::Sub: "https://${ServerlessHttpApi}.execute-api.${AWS::Region}.amazonaws.com/"
